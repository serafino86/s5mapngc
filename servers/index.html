<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Servers — Night Commando Fiodena</title>
    <link rel="stylesheet" href="../assets/styles.css" />
  </head>
  <body data-page="servers">
    <header class="site-header">
      <div class="wrap nav">
        <a class="brand" href="../" data-i18n="nav_brand">Night Commando Fiodena</a>
        <nav class="main-nav">
          <a href="../" data-i18n="nav_home">Home</a>
          <a href="../events/ammo-bonanza/" data-i18n="nav_ammo">Ammo Bonanza</a>
          <a href="../servers/" aria-current="page" data-i18n="nav_servers">Servers</a>
          <a href="../maps/planner/" data-i18n="nav_planner">Planner</a>
          <a href="../guide/" data-i18n="nav_guide">Guida S5</a>
        </nav>
        <div style="display:flex;gap:0.4rem;align-items:center">
          <button class="lang-pill active" data-lang="it" type="button">IT</button>
          <button class="lang-pill" data-lang="en" type="button">EN</button>
          <button class="lang-pill" data-lang="fr" type="button">FR</button>
          <button class="lang-pill" data-lang="de" type="button">DE</button>
          <button id="theme-toggle" class="ghost-button" type="button" data-i18n="ui_theme">Tema</button>
        </div>
      </div>
    </header>

    <main class="wrap section">
      <div class="section-head">
        <p class="eyebrow" data-i18n="servers_eyebrow">Dataset client-side</p>
        <h1 data-i18n="servers_title">Last War Server List</h1>
        <p class="lede" data-i18n="servers_lede">Lista server tattica stile NGC: filtri client-side e preferenze salvate in localStorage.</p>
      </div>

      <div class="toolbar card">
        <div class="toolbar-row">
          <label class="field grow">
            <span>Ricerca server</span>
            <input id="server-search" type="search" placeholder="es. 210, 214 oppure korea" />
          </label>
          <label class="field">
            <span>Regione</span>
            <select id="region-filter">
              <option value="">Tutte</option>
            </select>
          </label>
          <label class="field">
            <span>Ordina</span>
            <select id="sort-field">
              <option value="day-desc">Server day desc</option>
              <option value="day-asc">Server day asc</option>
              <option value="id-desc">Server id desc</option>
              <option value="id-asc">Server id asc</option>
            </select>
          </label>
        </div>
      </div>

      <div class="card table-card">
        <table class="data-table">
          <thead>
            <tr>
              <th>Server</th>
              <th>Region</th>
              <th>Season</th>
              <th>Week</th>
              <th>Alliances</th>
              <th>Server day</th>
            </tr>
          </thead>
          <tbody id="servers-body"></tbody>
        </table>
      </div>
    </main>

    <script src="../assets/translations.js"></script>
    <script src="../assets/app.js"></script>
    <script src="../assets/servers.js"></script>
  </body>
</html>
